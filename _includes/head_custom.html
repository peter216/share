<style>
  /* ── Dark-mode override for Minima 2.x (no built-in dark support) ─────────
     Minima injects head_custom.html into <head> *after* its own <link>, so
     these rules win the cascade without needing !important.                  */

  @media (prefers-color-scheme: dark) {
    :root { color-scheme: dark; }

    body {
      background-color: #0b1220;
      color: #e5e7eb;
    }

    /* Site header & nav */
    .site-header {
      background-color: #0b1220;
      border-bottom-color: #1f2937;
    }

    .site-header .site-title,
    .site-header .site-title:visited,
    .site-header .page-link {
      color: #e5e7eb;
    }

    .site-header .menu-icon > svg path {
      fill: #9ca3af;
    }

    /* Mobile nav dropdown */
    @media screen and (max-width: 600px) {
      .site-nav .trigger {
        background-color: #0f1a2e;
        border-color: #1f2937;
      }
    }

    /* Site footer */
    .site-footer {
      background-color: #0b1220;
      border-top-color: #1f2937;
      color: #9ca3af;
    }

    .site-footer a { color: #60a5fa; }

    /* Content areas */
    .page-content,
    .post-content,
    .home {
      background-color: transparent;
      color: #e5e7eb;
    }

    /* Links */
    a            { color: #60a5fa; }
    a:hover      { color: #93c5fd; }
    a:visited    { color: #818cf8; }

    /* Headings */
    h1, h2, h3, h4, h5, h6 { color: #e5e7eb; }

    /* Horizontal rules & blockquotes */
    hr              { border-color: #1f2937; }
    blockquote      { border-left-color: #374151; color: #9ca3af; }

    /* Inline code & pre blocks */
    code, pre {
      background-color: rgba(127, 127, 127, 0.15);
      color: #e5e7eb;
      border-color: #1f2937;
    }

    /* Table cells in dark mode */
    .page-content table th,
    .post-content  table th {
      background-color: #1f2937;
      color: #e5e7eb;
      border-color: #374151;
    }

    .page-content table td,
    .post-content  table td {
      background-color: #0f1a2e;
      color: #e5e7eb;
      border-color: #1f2937;
    }

    .page-content table tr:nth-child(even) td,
    .post-content  table tr:nth-child(even) td {
      background-color: #0b1220;
    }
  }

  /* ── Responsive tables (all color modes) ─────────────────────────────────
     display:block + overflow-x:auto gives a scroll escape hatch for tables
     that are genuinely too wide; white-space:normal + word-break:break-word
     lets cell text wrap so the table fits portrait mobile width naturally.   */

  .page-content table,
  .post-content  table {
    width: 100%;
    border-collapse: collapse;
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .page-content table th,
  .page-content table td,
  .post-content  table th,
  .post-content  table td {
    white-space: normal;
    word-break: break-word;
    overflow-wrap: break-word;
    vertical-align: top;
    padding: 0.4rem 0.65rem;
  }

  @media (max-width: 600px) {
    .page-content table,
    .post-content  table {
      font-size: 0.82rem;
    }
  }
</style>
